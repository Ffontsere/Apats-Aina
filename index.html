<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="L'Aina">
<meta name="theme-color" content="#f4ede0">
<title>L'Aina · Sopars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f4ede0;
  --cream-2:#ebe1ce;
  --paper:#fdf9f1;
  --sage:#2f4a3a;
  --sage-2:#5a6f5a;
  --terra:#c1602e;
  --terra-2:#e08658;
  --gold:#c89860;
  --ink:#1a1f1a;
  --muted:#7a7568;
  --line:#d9cfb8;
  --shadow:0 1px 0 rgba(26,31,26,.04), 0 8px 24px -12px rgba(26,31,26,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--cream);
  color:var(--ink);
  font-size:15px;line-height:1.5;
  background-image:
    radial-gradient(1200px 600px at 0% -10%,rgba(200,152,96,.18),transparent 60%),
    radial-gradient(900px 500px at 100% 110%,rgba(47,74,58,.12),transparent 60%);
}
#app{height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative}

/* HEADER */
header{
  padding:max(18px,env(safe-area-inset-top)) 20px 10px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--cream) 0%,rgba(244,237,224,.9) 100%);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  position:relative;z-index:5;
}
.brand{display:flex;align-items:baseline;gap:10px;justify-content:space-between}
.brand-left{display:flex;align-items:baseline;gap:10px}
.logo{
  font-family:'Fraunces',serif;font-weight:500;font-size:30px;
  letter-spacing:-.02em;color:var(--sage);
  font-variation-settings:"opsz" 144;
}
.logo em{font-style:italic;color:var(--terra);font-weight:400}
.tag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;font-weight:500}
.who{font-size:12px;color:var(--sage-2);margin-top:2px}
.sync{font-size:10px;color:var(--sage-2);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.sync.error{color:var(--terra)}

.weeknav{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.weeknav button{
  border:1px solid var(--line);background:var(--paper);
  width:32px;height:32px;border-radius:50%;
  font-size:14px;color:var(--sage);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.weeknav button:active{transform:scale(.95)}
.weekrange{font-family:'Fraunces',serif;font-size:16px;font-weight:500;color:var(--ink);text-align:center}
.weekrange small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;font-weight:500;margin-top:2px}

main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 16px calc(110px + env(safe-area-inset-bottom))}

.day{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:14px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:var(--shadow);
  position:relative;
}
.day.today{border-color:var(--terra);border-width:1.5px}
.day.today::before{
  content:"AVUI";position:absolute;top:10px;right:12px;
  font-size:9px;font-weight:700;letter-spacing:.15em;
  color:var(--terra);background:rgba(193,96,46,.1);
  padding:3px 7px;border-radius:20px;
}
.day-head{
  padding:11px 14px 8px;
  display:flex;align-items:baseline;gap:10px;
  border-bottom:1px dashed var(--line);
}
.day-name{font-family:'Fraunces',serif;font-size:18px;font-weight:500;letter-spacing:-.01em;color:var(--sage)}
.day-num{font-family:'Fraunces',serif;font-size:14px;color:var(--muted);font-weight:400}
.day-festiu{margin-left:auto;font-size:10px;color:var(--terra);font-weight:600;letter-spacing:.1em;text-transform:uppercase}

.meal{
  padding:11px 14px;display:flex;gap:10px;align-items:flex-start;
  cursor:pointer;transition:background .15s;
  border-top:1px solid rgba(217,207,184,.5);
}
.meal:first-of-type{border-top:none}
.meal:active{background:var(--cream-2)}
.meal-tag{
  font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  padding:3px 7px;border-radius:3px;flex-shrink:0;margin-top:2px;
  min-width:54px;text-align:center;
}
.meal-tag.lunch{background:rgba(47,74,58,.1);color:var(--sage)}
.meal-tag.dinner{background:rgba(193,96,46,.12);color:var(--terra)}
.meal-body{flex:1;min-width:0}
.meal-name{font-size:13.5px;font-weight:500;color:var(--ink);line-height:1.35}
.meal-meta{display:flex;gap:10px;align-items:center;margin-top:4px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.meal-status{display:inline-flex;align-items:center;gap:3px}
.meal-arrow{color:var(--muted);font-size:14px;align-self:center;flex-shrink:0}

.festiu-only{padding:18px 14px;text-align:center;color:var(--muted);font-family:'Fraunces',serif;font-style:italic;font-size:14px}

nav.tabs{
  position:fixed;bottom:0;left:0;right:0;
  max-width:520px;margin:0 auto;
  background:var(--paper);border-top:1px solid var(--line);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
  display:flex;justify-content:space-around;z-index:10;
  box-shadow:0 -8px 24px -12px rgba(26,31,26,.1);
}
.tab{
  flex:1;background:none;border:none;padding:8px 4px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.06em;
  cursor:pointer;border-radius:10px;transition:color .15s;
}
.tab.active{color:var(--sage)}
.tab svg{width:22px;height:22px;stroke-width:1.6}

.modal-bg{position:fixed;inset:0;background:rgba(26,31,26,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:20;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal{
  position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;
  background:var(--paper);border-radius:24px 24px 0 0;z-index:21;
  max-height:90vh;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.3,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.modal.open{transform:translateY(0)}
.modal-grip{width:38px;height:4px;background:var(--line);border-radius:2px;margin:8px auto 0;flex-shrink:0}
.modal-head{
  padding:14px 22px;border-bottom:1px solid var(--line);
  display:flex;align-items:flex-start;gap:12px;flex-shrink:0;
}
.modal-head-info{flex:1;min-width:0}
.modal-kicker{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--terra);margin-bottom:4px}
.modal-kicker.lunch{color:var(--sage)}
.modal-title{font-family:'Fraunces',serif;font-size:24px;font-weight:500;line-height:1.15;letter-spacing:-.015em;color:var(--ink)}
.modal-time{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.modal-close{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--line);
  background:var(--cream);color:var(--ink);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 22px calc(30px + env(safe-area-inset-bottom))}

.section-title{
  font-family:'Fraunces',serif;font-size:13px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--sage);
  margin:18px 0 10px;display:flex;align-items:center;gap:8px;
}
.section-title:first-child{margin-top:0}
.section-title::before{content:"";flex-shrink:0;width:14px;height:1.5px;background:var(--terra)}

.why{
  background:linear-gradient(135deg,rgba(200,152,96,.12),rgba(47,74,58,.06));
  border:1px solid rgba(200,152,96,.3);
  padding:11px 13px;border-radius:10px;
  font-size:13px;color:var(--sage);line-height:1.45;
}
.why em{font-style:italic;font-family:'Fraunces',serif;color:var(--terra);font-weight:500}

.ingredients{list-style:none;padding:0;margin:0}
.ingredients li{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.ingredients li:last-child{border-bottom:none}
.ing-check{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.ing-check.have{background:var(--sage);color:white}
.ing-check.miss{background:var(--cream-2);color:var(--terra);border:1px solid var(--terra)}
.ing-name{flex:1}
.ing-qty{color:var(--muted);font-size:12px}

.recipe-step{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start}
.recipe-num{font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--terra);flex-shrink:0;min-width:18px;line-height:1.2;font-weight:500}
.recipe-text{font-size:13.5px;line-height:1.5;color:var(--ink)}

.feedback{margin-top:6px}
.fb-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fb-btn{
  flex:1;min-width:64px;padding:9px 4px;border-radius:10px;
  border:1px solid var(--line);background:var(--paper);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--ink);transition:all .15s;
}
.fb-btn .emoji{font-size:18px}
.fb-btn.active{background:var(--sage);color:var(--paper);border-color:var(--sage)}
.fb-row.qty .fb-btn.active{background:var(--terra);color:var(--paper);border-color:var(--terra)}

.note-input{
  width:100%;border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13.5px;
  background:var(--cream);color:var(--ink);resize:vertical;min-height:52px;
}
.note-input:focus{outline:none;border-color:var(--sage);background:var(--paper)}

.alt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}
.alt-btn{
  padding:9px 8px;border-radius:10px;border:1px solid var(--line);background:var(--paper);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:2px;
  color:var(--ink);transition:all .15s;
}
.alt-btn:active{background:var(--cream-2)}
.alt-btn.selected{border-color:var(--sage);background:rgba(47,74,58,.06)}
.alt-btn .alt-name{font-size:12px;font-weight:600;line-height:1.3}
.alt-btn .alt-meta{font-size:10px;color:var(--muted)}
.alt-section{margin-top:4px}
.alt-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.edit-btn{
  margin-top:14px;width:100%;padding:12px;border-radius:10px;
  border:1px dashed var(--line);background:transparent;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  color:var(--sage);cursor:pointer;letter-spacing:.05em;
}

.tab-pane{display:none}
.tab-pane.active{display:block}
.cat-title{
  font-family:'Fraunces',serif;font-size:13px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--sage);
  margin:16px 0 8px;
}
.cat-title:first-child{margin-top:4px}
.inv-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;margin-bottom:7px}
.inv-name{flex:1;font-size:13.5px}
.inv-qty{font-size:12px;color:var(--muted);min-width:50px;text-align:right}
.inv-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:var(--cream);font-size:14px;color:var(--sage);cursor:pointer;display:flex;align-items:center;justify-content:center}

.shop-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;margin-bottom:7px}
.shop-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--terra);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;transition:all .2s;color:white;font-size:12px}
.shop-check.done{background:var(--sage);border-color:var(--sage)}
.shop-name{flex:1;font-size:13.5px}
.shop-item.done .shop-name{text-decoration:line-through;color:var(--muted)}
.shop-qty{font-size:12px;color:var(--muted)}

.section-intro{font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.4}

.upload-btn{
  width:100%;padding:13px;border-radius:10px;
  border:1.5px dashed var(--terra);background:rgba(193,96,46,.06);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  color:var(--terra);cursor:pointer;letter-spacing:.05em;margin-top:14px;
}

/* Login */
.login{
  position:fixed;inset:0;background:var(--cream);
  z-index:50;display:flex;align-items:center;justify-content:center;
  padding:30px;
}
.login-card{
  background:var(--paper);border:1px solid var(--line);
  border-radius:16px;padding:30px 24px;max-width:360px;width:100%;
  box-shadow:var(--shadow);
}
.login-card h1{
  font-family:'Fraunces',serif;font-size:28px;font-weight:500;
  margin:0 0 6px;letter-spacing:-.02em;color:var(--sage);
}
.login-card h1 em{font-style:italic;color:var(--terra)}
.login-card p{margin:0 0 18px;font-size:13px;color:var(--muted)}
.login-input{
  width:100%;border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;
  background:var(--cream);color:var(--ink);margin-bottom:10px;
}
.login-input:focus{outline:none;border-color:var(--sage);background:var(--paper)}
.login-btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:var(--sage);color:var(--paper);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:.05em;cursor:pointer;
}
.login-err{font-size:12px;color:var(--terra);margin-top:8px;min-height:16px}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--sage);color:var(--paper);padding:10px 18px;border-radius:30px;
  font-size:12px;font-weight:500;opacity:0;transition:all .25s;z-index:30;
  box-shadow:var(--shadow);pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--terra)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-card">
    <h1>L'<em>Aina</em></h1>
    <p>Introdueix el teu token de GitHub per sincronitzar entre mòbils.</p>
    <input type="password" class="login-input" id="login-key" placeholder="Clau" autocomplete="off">
    <button class="login-btn" id="login-btn">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="app" style="display:none">
<header>
  <div class="brand">
    <div class="brand-left">
      <div>
        <div class="logo">L'<em>Aina</em></div>
        <div class="who">2 anys · Sopars equilibrats</div>
      </div>
    </div>
    <div class="sync" id="sync-status">SINCRONITZAT</div>
  </div>
  <div class="weeknav">
    <button id="prev-week" aria-label="Setmana anterior">‹</button>
    <div class="weekrange" id="week-label">—<small>Setmana —</small></div>
    <button id="next-week" aria-label="Setmana següent">›</button>
  </div>
</header>

<main>
  <section class="tab-pane active" id="pane-week"></section>
  <section class="tab-pane" id="pane-inv">
    <p class="section-intro">El que tens a casa avui. Toca + o − per ajustar.</p>
    <div id="inv-list"></div>
    <button class="upload-btn" id="upload-btn">📷 Pujar tiquet de la compra</button>
  </section>
  <section class="tab-pane" id="pane-shop">
    <p class="section-intro">Generada a partir dels sopars de la setmana i l'estoc actual.</p>
    <div id="shop-list"></div>
  </section>
</main>

<nav class="tabs">
  <button class="tab active" data-pane="week">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
    SETMANA
  </button>
  <button class="tab" data-pane="inv">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 8h14l-1.5 11a2 2 0 0 1-2 1.8h-7a2 2 0 0 1-2-1.8L5 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>
    ESTOC
  </button>
  <button class="tab" data-pane="shop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 5h2l2.5 11h11l2.5-8H6"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
    COMPRA
  </button>
</nav>
</div>

<div class="modal-bg" id="modal-bg"></div>
<div class="modal" id="modal">
  <div class="modal-grip"></div>
  <div class="modal-head">
    <div class="modal-head-info">
      <div class="modal-kicker" id="m-kicker">—</div>
      <div class="modal-title" id="m-title">—</div>
      <div class="modal-time" id="m-time"></div>
    </div>
    <button class="modal-close" id="m-close">×</button>
  </div>
  <div class="modal-body" id="m-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================================================================
   DADES ESTÀTIQUES (codi)
   ====================================================================== */

  "2026-05-22": { text: "Empedrat de mongeta blanca · Remenat d'ou amb xampinyons · Fruita", cats: ["llegum","ou"] },

/* ======================================================================
   API — GitHub Gist backend
   ====================================================================== */
const GIST_ID = '95242e91225fa897e1803a475b27f466';
const GIST_FILE = 'state.json';
let AUTH_KEY = localStorage.getItem('aina_auth') || '';

async function apiGet(){
  const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    headers: {
      'Authorization': `token ${AUTH_KEY}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (r.status === 401 || r.status === 403) throw new Error('AUTH');
  if (!r.ok) throw new Error('NETWORK');
  const gist = await r.json();
  const content = gist.files?.[GIST_FILE]?.content || '{}';
  return JSON.parse(content);
}
async function apiPut(state){
  const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `token ${AUTH_KEY}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      files: { [GIST_FILE]: { content: JSON.stringify(state) } }
    })
  });
  if (r.status === 401 || r.status === 403) throw new Error('AUTH');
  if (!r.ok) throw new Error('NETWORK');
  return await r.json();
}

const DAY_NAMES = ['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
const MONTHS = ['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];

function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function mondayOf(d){
  const m = new Date(d);
  const dow = m.getDay(); // 0 dg, 1 dl
  const diff = dow===0 ? -6 : 1-dow;
  m.setDate(m.getDate()+diff);
  m.setHours(0,0,0,0);
  return m;
}
function getWeekNum(d){
  const oneJan = new Date(d.getFullYear(),0,1);
  const days = Math.floor((d - oneJan)/(24*3600*1000));
  return Math.ceil((days + oneJan.getDay()+1)/7);
}

    ? `${start.getDate()} — ${end.getDate()} ${MONTHS[end.getMonth()]}`

  document.getElementById('week-label').innerHTML = lab + '<small>Setmana ' + getWeekNum(start) + '</small>';

  for(let i=0;i<7;i++){

    const isWeekend = d.getDay()===0 || d.getDay()===6;

function statusLabel(s){return {tot:'Tot ✓',meitat:'Meitat',poc:'Poc',res:'Res'}[s]||s}

function whyForDay(key, dinnerKey){
  const school = SCHOOL_MENUS[key];
  if(!school || school.festiu) return '';
  const dinner = RECIPES[dinnerKey];
  if(!dinner) return '';
  const lunchCats = school.cats || [];
  const dinnerCats = dinner.cats || [];
  const tagMap = {peix:'peix',carn:'carn',ou:'ou',llegum:'llegum',verdura:'verdura',pasta:'pasta',arros:'arròs',patata:'patata'};
  const lunchTxt = lunchCats.map(c=>tagMap[c]||c).join(', ');
  const dinnerTxt = dinnerCats.map(c=>tagMap[c]||c).join(' + ');
  return `A l'escola han menjat <em>${lunchTxt}</em>. Per sopar, ${dinnerTxt}.`;
}

    }).sort((a,b) => a[1].time - b[1].time).slice(0,6);

    // Altres: la resta, sense les recomanades ni l'actual
    const recIds = new Set([recipeKey, ...recommended.map(([id])=>id)]);

      <textarea class="note-input" placeholder="Una nota? (ex: ha llençat les pastanagues...)" id="m-note">${fb.comment||''}</textarea>
    </div>`;

  body.querySelectorAll('[data-fb-sat]').forEach(b=>{
    b.addEventListener('click',()=>{
      const v = b.dataset.fbSat;
      state.feedback[fbKey] = state.feedback[fbKey]||{};

function generateShoppingList(){
  // Recull tots els ingredients dels sopars de la setmana actual
  // que NO tenim a l'inventari
  const ingredients = new Map();
  for(let i=0;i<7;i++){
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    const key = fmtDate(d);
    const dinnerKey = state.mealOverrides[key+'-dinner'] || DEFAULT_DINNERS[key];
    const weekendLunchKey = WEEKEND_LUNCHES[key];
    [dinnerKey, weekendLunchKey].filter(Boolean).forEach(rk=>{
      const r = RECIPES[rk]; if(!r) return;
      r.ingredients.forEach(ing=>{
        if(!haveIngredient(ing.n)){
          if(!ingredients.has(ing.n)) ingredients.set(ing.n, ing.q);
        }
      });
    });
  }
  return Array.from(ingredients.entries()).map(([name,qty])=>({name,qty}));
}

function renderShopping(){
  const list = document.getElementById('shop-list');
  list.innerHTML = '';
  const items = generateShoppingList();
  if(items.length===0){
    list.innerHTML = '<div class="festiu-only">Tot el necessari ja és a casa! 🎉</div>';
    return;
  }
  items.forEach(s=>{
    const done = state.shopDone[s.name];
    const el = document.createElement('div');
    el.className = 'shop-item' + (done?' done':'');
    el.innerHTML = `
      <button class="shop-check ${done?'done':''}">${done?'✓':''}</button>
      <div class="shop-name">${s.name}</div>
      <div class="shop-qty">${s.qty}</div>
    `;
    el.querySelector('.shop-check').addEventListener('click',()=>{
      state.shopDone[s.name] = !state.shopDone[s.name];
      scheduleSave();
      renderShopping();
    });
    list.appendChild(el);
  });
}

   LOGIN
   ====================================================================== */
async function tryLogin(){
  const key = document.getElementById('login-key').value.trim();
  if(!key) return;
  AUTH_KEY = key;
  try{
    const data = await apiGet();
    localStorage.setItem('aina_auth', key);
    Object.assign(state, data);
    if(!state.feedback) state.feedback = {};
    if(!state.mealOverrides) state.mealOverrides = {};
    if(!state.inventory) state.inventory = [];
    if(!state.shopDone) state.shopDone = {};
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    renderWeek();
  }catch(e){
    if(e.message==='AUTH'){
      document.getElementById('login-err').textContent = 'Clau incorrecta.';
      AUTH_KEY = '';
    } else {
      document.getElementById('login-err').textContent = 'Error de connexió. Reintenta.';
    }
  }
}
document.getElementById('login-btn').addEventListener('click',tryLogin);
document.getElementById('login-key').addEventListener('keydown',(e)=>{ if(e.key==='Enter') tryLogin() });
