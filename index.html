<title>L'Aina · Sopars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f4ede0;
  --cream-2:#ebe1ce;
  --paper:#fdf9f1;
  --sage:#2f4a3a;
  --sage-2:#5a6f5a;
  --terra:#c1602e;
  --ink:#1a1f1a;
  --muted:#7a7568;
  --line:#d9cfb8;
  --shadow:0 1px 0 rgba(26,31,26,.04),0 4px 16px -8px rgba(26,31,26,.14);
  --r:12px;
  --touch:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html{height:100%;height:-webkit-fill-available}
body{
  margin:0;padding:0;
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--cream);color:var(--ink);
  font-size:16px;line-height:1.5;
  height:100vh;height:-webkit-fill-available;
  overflow:hidden;overscroll-behavior:none;
}
#app{
  height:100vh;height:-webkit-fill-available;
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  position:relative;
}

/* HEADER */
header{
  padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;
  border-bottom:1px solid var(--line);
  background:rgba(244,237,224,.96);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:relative;z-index:5;flex-shrink:0;
}
.brand{display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:40px;height:40px;flex-shrink:0;
}
.logo-text{line-height:1}
.logo-title{
  font-family:'Fraunces',serif;font-weight:500;font-size:22px;
  letter-spacing:-.02em;color:var(--sage);line-height:1;
}
.logo-title em{font-style:italic;color:var(--terra);font-weight:400}
.who{font-size:11px;color:var(--sage-2);margin-top:2px}
.sync{
  font-size:10px;color:var(--sage-2);
  text-transform:uppercase;letter-spacing:.1em;font-weight:600;
  background:rgba(47,74,58,.08);padding:4px 8px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
}
.sync.error{color:var(--terra);background:rgba(193,96,46,.1)}

.weeknav{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;gap:8px;
}
.weeknav button{
  border:1px solid var(--line);background:var(--paper);
  min-width:var(--touch);height:var(--touch);border-radius:50%;
  font-size:20px;color:var(--sage);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.weeknav button:active{background:var(--cream-2)}
.weekrange{
  font-family:'Fraunces',serif;font-size:15px;font-weight:500;
  color:var(--ink);text-align:center;flex:1;
}
.weekrange small{
  display:block;font-family:'DM Sans',sans-serif;
  font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;font-weight:500;margin-top:1px;
}

/* MAIN SCROLL */
main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:12px 12px calc(80px + env(safe-area-inset-bottom));
}

/* DAY CARDS */
.day{
  background:var(--paper);border:1px solid var(--line);
  border-radius:var(--r);margin-bottom:10px;
  overflow:hidden;box-shadow:var(--shadow);position:relative;
}
.day.today{border-color:var(--terra);border-width:2px}
.day.today::before{
  content:"AVUI";position:absolute;top:9px;right:10px;
  font-size:9px;font-weight:700;letter-spacing:.14em;
  color:var(--terra);background:rgba(193,96,46,.1);
  padding:2px 7px;border-radius:20px;
}
.day-head{
  padding:10px 12px 8px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px dashed var(--line);
}
.day-name{
  font-family:'Fraunces',serif;font-size:17px;
  font-weight:500;color:var(--sage);
}
.day-num{font-size:13px;color:var(--muted)}
.day-festiu{
  margin-left:auto;font-size:9px;color:var(--terra);
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}

.meal{
  padding:12px;display:flex;gap:10px;align-items:center;
  min-height:var(--touch);
  border-top:1px solid rgba(217,207,184,.5);
  cursor:pointer;
}
.meal:first-of-type{border-top:none}
.meal:active{background:var(--cream-2)}
.meal-tag{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;padding:4px 8px;border-radius:4px;
  flex-shrink:0;width:52px;text-align:center;
}
.meal-tag.lunch{background:rgba(47,74,58,.1);color:var(--sage)}
.meal-tag.dinner{background:rgba(193,96,46,.12);color:var(--terra)}
.meal-body{flex:1;min-width:0}
.meal-name{
  font-size:14px;font-weight:500;color:var(--ink);
  line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.meal-meta{
  display:flex;gap:8px;align-items:center;
  margin-top:3px;font-size:11px;color:var(--muted);
}
.meal-arrow{color:var(--line);font-size:18px;flex-shrink:0}

.festiu-only{
  padding:16px 12px;text-align:center;
  color:var(--muted);font-family:'Fraunces',serif;
  font-style:italic;font-size:14px;
}

/* TAB BAR */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;
  background:rgba(253,249,241,.97);
  border-top:1px solid var(--line);
  padding:4px 8px calc(4px + env(safe-area-inset-bottom));
  display:flex;z-index:10;
  box-shadow:0 -4px 20px -8px rgba(26,31,26,.12);
}
.tab{
  flex:1;background:none;border:none;
  min-height:var(--touch);padding:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.05em;
  cursor:pointer;border-radius:10px;
}
.tab.active{color:var(--sage)}
.tab svg{width:24px;height:24px;stroke-width:1.5}

/* MODAL */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(26,31,26,.5);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:20;opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal{
  position:fixed;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;
  background:var(--paper);
  border-radius:20px 20px 0 0;
  z-index:21;max-height:92vh;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.2,.8,.3,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.modal.open{transform:translateY(0)}
.modal-grip{
  width:36px;height:4px;background:var(--line);
  border-radius:2px;margin:8px auto 0;flex-shrink:0;
}
.modal-head{
  padding:12px 16px 12px;border-bottom:1px solid var(--line);
  display:flex;align-items:flex-start;gap:10px;flex-shrink:0;
}
.modal-head-info{flex:1;min-width:0}
.modal-kicker{
  font-size:10px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--terra);margin-bottom:3px;
}
.modal-kicker.lunch{color:var(--sage)}
.modal-title{
  font-family:'Fraunces',serif;font-size:20px;font-weight:500;
  line-height:1.2;color:var(--ink);
}
.modal-time{
  font-size:12px;color:var(--muted);margin-top:3px;
  display:flex;align-items:center;gap:4px;
}
.modal-close{
  min-width:var(--touch);min-height:var(--touch);
  border-radius:50%;border:1px solid var(--line);
  background:var(--cream);color:var(--ink);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}

// Funció per obtenir el sopar d'un dia, evitant repeticions setmanals
function getDinnerForDay(dateKey) {
  // Si hi ha un override manual, usar-lo
  if (state.mealOverrides[dateKey + '-dinner']) return state.mealOverrides[dateKey + '-dinner'];
  // Sopar per defecte del calendari
  return DEFAULT_DINNERS[dateKey] || null;
}

function getWeekDinners(weekStartDate) {
  // Retorna els IDs de receptes ja assignades a la setmana (manuals o per defecte)
  const used = new Set();
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStartDate); d.setDate(d.getDate() + i);
    const key = fmtDate(d);
    const id = getDinnerForDay(key);
    if (id) used.add(id);
  }
  return used;
}

/* ======================================================================
   API — GitHub Gist backend
   ====================================================================== */
const GIST_ID = '95242e91225fa897e1803a475b27f466';
const GIST_FILE = 'state.json';
let AUTH_KEY = localStorage.getItem('aina_auth') || '';

async function apiGet(){
  const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    headers: {
      'Authorization': `token ${AUTH_KEY}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (r.status === 401 || r.status === 403) throw new Error('AUTH');
  if (!r.ok) throw new Error('NETWORK');
  const gist = await r.json();
  const content = gist.files?.[GIST_FILE]?.content || '{}';
  return JSON.parse(content);
}
async function apiPut(state){
  const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `token ${AUTH_KEY}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      files: { [GIST_FILE]: { content: JSON.stringify(state) } }
    })
  });
  if (r.status === 401 || r.status === 403) throw new Error('AUTH');
  if (!r.ok) throw new Error('NETWORK');
  return await r.json();
}

const DAY_NAMES = ['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
const MONTHS = ['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];

function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function mondayOf(d){
  const m = new Date(d);
  const dow = m.getDay(); // 0 dg, 1 dl
  const diff = dow===0 ? -6 : 1-dow;
  m.setDate(m.getDate()+diff);
  m.setHours(0,0,0,0);
  return m;
}
function getWeekNum(d){
  const oneJan = new Date(d.getFullYear(),0,1);
  const days = Math.floor((d - oneJan)/(24*3600*1000));
  return Math.ceil((days + oneJan.getDay()+1)/7);
}

    ? `${start.getDate()} — ${end.getDate()} ${MONTHS[end.getMonth()]}`
    : `${start.getDate()} ${MONTHS[start.getMonth()].slice(0,3)} — ${end.getDate()} ${MONTHS[end.getMonth()].slice(0,3)}`;
  document.getElementById('week-label').innerHTML = lab + '<small>Setmana ' + getWeekNum(start) + '</small>';

  for(let i=0;i<7;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const key = fmtDate(d);
    const isWeekend = d.getDay()===0 || d.getDay()===6;
    const isToday = isSameDay(d,today);

    const school = SCHOOL_MENUS[key];
    const lunchOverride = state.mealOverrides[key+'-lunch'];
    const dinnerOverride = state.mealOverrides[key+'-dinner'];
    const dinnerKey = dinnerOverride || DEFAULT_DINNERS[key];

    const card = document.createElement('div');

      <div class="day-name">${DAY_NAMES[d.getDay()]}</div>

        </div>

        <div class="meal-tag lunch">DINAR</div>

function statusLabel(s){return {tot:'Tot ✓',meitat:'Meitat',poc:'Poc',res:'Res'}[s]||s}

function whyForDay(key, dinnerKey){
  const school = SCHOOL_MENUS[key];
  if(!school || school.festiu) return '';
  const dinner = RECIPES[dinnerKey];
  if(!dinner) return '';
  const lunchCats = school.cats || [];
  const dinnerCats = dinner.cats || [];
  const tagMap = {peix:'peix',carn:'carn',ou:'ou',llegum:'llegum',verdura:'verdura',pasta:'pasta',arros:'arròs',patata:'patata'};
  const lunchTxt = lunchCats.map(c=>tagMap[c]||c).join(', ');
  const dinnerTxt = dinnerCats.map(c=>tagMap[c]||c).join(' + ');
  return `A l'escola han menjat <em>${lunchTxt}</em>. Per sopar, ${dinnerTxt}.`;
}

    r.ingredients.forEach(ing=>{
      const have = haveIngredient(ing.n);
      html += `<li>

  // Alternatives (només per a sopars i dinars de cap de setmana, no escola)
  if(!isSchool && recipeKey){

    const lunchCats = school?.cats || [];

    const weekUsed = getWeekDinners(weekStart);

    // Recomanades: complementen el dinar + no repetides setmana
    const recommended = allRecipes.filter(([id, r]) => {
      if(id === recipeKey) return false;
      if(weekUsed.has(id)) return false; // no repetir setmana
      return r.cats.every(c => !lunchCats.includes(c));
    }).sort((a,b) => a[1].time - b[1].time).slice(0,6);

    // Altres: no usades setmana, sense les recomanades ni l'actual
    const recIds = new Set([recipeKey, ...recommended.map(([id])=>id)]);
    const others = allRecipes.filter(([id]) => {
      if(recIds.has(id)) return false;
      if(weekUsed.has(id)) return false; // no repetir setmana
      return true;

        ${['encantat','bé','poc','no'].map(v=>{
          const labels={encantat:'Encantada','bé':'Bé',poc:'Així-així',no:'No vol'};

      </div>
      <textarea class="note-input" placeholder="Una nota? (ex: ha llençat les pastanagues...)" id="m-note">${fb.comment||''}</textarea>
    </div>`;

  body.innerHTML = html;

  // Bind alternatives
  body.querySelectorAll('[data-alt-id]').forEach(b => {
    b.addEventListener('click', () => {
      const newRecipe = b.dataset.altId;
      state.mealOverrides[dateKey + '-' + type] = newRecipe;

      // Reobrir amb la nova recepta
      setTimeout(() => openModal(dateKey, type, newRecipe, false), 300);

  body.querySelectorAll('[data-fb-sat]').forEach(b=>{

      const v = b.dataset.fbSat;
      state.feedback[fbKey] = state.feedback[fbKey]||{};

      // Bind alternatives
  body.querySelectorAll('[data-alt-id]').forEach(b => {
    b.addEventListener('click', () => {

  body.querySelectorAll('[data-fb-sat]').forEach(x=>x.classList.toggle('active', x.dataset.fbSat===state.feedback[fbKey].sat));
    });
  });
  body.querySelectorAll('[data-fb-amt]').forEach(b=>{

function renderMonth(){
  const pane = document.getElementById('pane-month');
  const now = new Date();
  const year = weekStart.getFullYear();
  const month = weekStart.getMonth();
  const monthName = MONTHS[month].charAt(0).toUpperCase() + MONTHS[month].slice(1);

  // Actualitzar label header
  document.getElementById('week-label').innerHTML =
    monthName + ' ' + year + '<small>Vista mensual</small>';

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  // Ajustar: dilluns=0
  let startDow = firstDay.getDay() - 1;
  if(startDow < 0) startDow = 6;

  const DOWS = ['Dl','Dt','Dc','Dj','Dv','Ds','Dg'];
  let html = '<div class="month-header">';
  DOWS.forEach(d=> html += `<div class="month-dow">${d}</div>`);
  html += '</div><div class="month-grid">';

  // Cel·les buides inici
  for(let i=0;i<startDow;i++) html += '<div class="month-day empty"></div>';

  for(let d=1;d<=lastDay.getDate();d++){
    const date = new Date(year,month,d);
    const key = fmtDate(date);
    const school = SCHOOL_MENUS[key];
    const isToday = isSameDay(date,now);
    const isFestiu = school?.festiu;
    const hasDinner = DEFAULT_DINNERS[key] || state.mealOverrides[key+'-dinner'];
    const hasLunch = school && !school.festiu;
    const fb = state.feedback[key+'-dinner'];

    let cls = 'month-day';
    if(isToday) cls += ' today';
    if(isFestiu) cls += ' festiu';

    html += `<div class="${cls}" data-month-key="${key}">
      <span class="month-day-num">${d}</span>
      <div class="month-dots">
        ${hasLunch ? '<span class="month-dot dot-lunch" title="Dinar escola"></span>' : ''}
        ${hasDinner ? '<span class="month-dot dot-dinner" title="Sopar"></span>' : ''}
        ${fb?.sat ? '<span class="month-dot dot-fb" title="Valorat"></span>' : ''}
      </div>
    </div>`;
  }
  html += '</div>';

  // Llegenda
  html += `<div style="display:flex;gap:12px;margin-top:12px;padding:0 4px">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
      <span class="month-dot dot-lunch"></span> Dinar escola
    </div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
      <span class="month-dot dot-dinner"></span> Sopar
    </div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">
      <span class="month-dot dot-fb"></span> Valorat
    </div>
  </div>`;

  pane.innerHTML = html;

  // Toc al dia → obrir sopar
  pane.querySelectorAll('[data-month-key]').forEach(el=>{
    el.addEventListener('click',()=>{
      const k = el.dataset.monthKey;
      const dinnerKey = state.mealOverrides[k+'-dinner'] || DEFAULT_DINNERS[k];
      if(!dinnerKey) return;
      // Canviar a vista setmana del dia
      const d = new Date(k+'T12:00:00');
      weekStart = mondayOf(d);
      currentView = 'week';
      document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active', b.dataset.view==='week'));
      document.getElementById('weeknav-bar').style.display='flex';
      document.getElementById('pane-month').classList.remove('active');
      document.getElementById('pane-week').classList.add('active');
      renderWeek();
      setTimeout(()=> openModal(k,'dinner',dinnerKey,false), 300);
    });
  });
}

/* ======================================================================
   ESTADÍSTIQUES
   ====================================================================== */
function renderStats(){
  const pane = document.getElementById('stats-content');
  const year = weekStart.getFullYear();
  const month = weekStart.getMonth();
  const lastDay = new Date(year, month+1, 0).getDate();

  // Comptar categories per tot el mes
  const catCount = {};
  const catLabel = {peix:'Peix 🐟',carn:'Carn 🥩',ou:'Ous 🥚',llegum:'Llegums 🫘',verdura:'Verdura 🥦',arros:'Arròs 🍚',pasta:'Pasta 🍝',patata:'Patata 🥔'};
  const catColor = {peix:'#3a7ca5',carn:'#c1602e',ou:'#e8a838',llegum:'#5a6f2a',verdura:'#4a8f5a',arros:'#c89860',pasta:'#9b6b9b',patata:'#b8943a'};

  let totalMeals = 0, ratedMeals = 0, lovedMeals = 0;

  for(let d=1;d<=lastDay;d++){
    const key = fmtDate(new Date(year,month,d));
    const school = SCHOOL_MENUS[key];

    // Dinar escola
    if(school && !school.festiu){
      (school.cats||[]).forEach(c=>{ catCount[c]=(catCount[c]||0)+1; });
      totalMeals++;
    }
    // Sopar
    const dinnerKey = state.mealOverrides[key+'-dinner'] || DEFAULT_DINNERS[key];
    if(dinnerKey && RECIPES[dinnerKey]){
      (RECIPES[dinnerKey].cats||[]).forEach(c=>{ catCount[c]=(catCount[c]||0)+1; });
      totalMeals++;
      const fb = state.feedback[key+'-dinner'];
      if(fb?.sat){ ratedMeals++; if(fb.sat==='encantat'||fb.sat==='bé') lovedMeals++; }
    }
  }

  const maxVal = Math.max(...Object.values(catCount), 1);
  const monthName = MONTHS[month].charAt(0).toUpperCase()+MONTHS[month].slice(1);

  let html = `<p class="section-intro">${monthName} ${year} · Tots els àpats</p>`;

  // Cards resum
  const rated = ratedMeals > 0 ? Math.round(lovedMeals/ratedMeals*100) : '—';
  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${totalMeals}</div><div class="stat-label">Àpats totals</div></div>
    <div class="stat-card"><div class="stat-num">${ratedMeals}</div><div class="stat-label">Valorats</div></div>
    <div class="stat-card"><div class="stat-num">${lovedMeals}</div><div class="stat-label">Li ha agradat</div></div>
    <div class="stat-card"><div class="stat-num">${rated}${rated!=='—'?'%':''}</div><div class="stat-label">% positiu</div></div>
  </div>`;

  // Gràfic de barres
  html += `<div class="section-title">Distribució per aliment</div>`;
  const sorted = Object.entries(catCount).sort((a,b)=>b[1]-a[1]);
  sorted.forEach(([cat, count])=>{
    const pct = Math.round(count/maxVal*100);
    const color = catColor[cat]||'#888';
    const label = catLabel[cat]||cat;
    html += `<div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="bar-count">${count}</div>
    </div>`;
  });

  // Historial feedback
  const fbEntries = Object.entries(state.feedback||{})
    .filter(([k,v])=>v?.comment && k.endsWith('-dinner'))
    .sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5);

  if(fbEntries.length){
    html += `<div class="section-title">Últims comentaris</div>`;
    fbEntries.forEach(([k,fb])=>{
      const dateKey = k.replace('-dinner','');
      const dinnerKey = state.mealOverrides[k] || DEFAULT_DINNERS[dateKey];
      const name = dinnerKey && RECIPES[dinnerKey] ? RECIPES[dinnerKey].name : dateKey;
      const emojis={encantat:'😍',bé:'🙂',poc:'😐',no:'🚫'};
      html += `<div style="padding:10px 12px;background:var(--paper);border:1px solid var(--line);border-radius:10px;margin-bottom:6px">
        <div style="font-size:12px;font-weight:600;color:var(--sage);margin-bottom:4px">${name} ${emojis[fb.sat]||''}</div>
        <div style="font-size:13px;color:var(--ink)">${fb.comment}</div>
      </div>`;
    });
  }

  pane.innerHTML = html;
}

document.getElementById('prev-week').addEventListener('click',()=>{
  weekStart.setDate(weekStart.getDate()-7);
  renderWeek();
});
document.getElementById('next-week').addEventListener('click',()=>{
  weekStart.setDate(weekStart.getDate()+7);
  renderWeek();
});

/* ======================================================================
   INVENTARI
   ====================================================================== */
function renderInventory(){
  const list = document.getElementById('inv-list');
  list.innerHTML = '';
  if(state.inventory.length===0){
    list.innerHTML = '<div class="festiu-only">Encara no hi ha res a l\'inventari.<br>Demana a Claude que l\'ompli o puja un tiquet.</div>';
    return;
  }
  const cats = ['Fresc','Sec','Congelat'];
  cats.forEach(cat=>{
    const items = state.inventory.filter(i=>i.cat===cat);
    if(items.length===0) return;
    const t = document.createElement('div');
    t.className = 'cat-title';
    t.textContent = cat==='Fresc'?'Fresc i nevera':cat==='Sec'?'Rebost i sec':'Congelat';
    list.appendChild(t);
    items.forEach((i,idx)=>{
      const realIdx = state.inventory.indexOf(i);
      const el = document.createElement('div');
      el.className = 'inv-item';
      el.innerHTML = `
        <div class="inv-name">${i.name}</div>
        <div class="inv-qty">${i.qty||''}</div>
        <button class="inv-btn" data-act="del">×</button>
      `;
      el.querySelector('[data-act=del]').addEventListener('click',()=>{
        if(confirm(`Eliminar ${i.name}?`)){
          state.inventory.splice(realIdx,1);
          scheduleSave();
          renderInventory();
        }
      });
      list.appendChild(el);
    });
  });
}

document.getElementById('upload-btn').addEventListener('click',()=>{
  alert('Per actualitzar l\'estoc:\n\n1. Fes una foto del tiquet.\n2. Envia-la a Claude al xat.\n3. Claude actualitzarà l\'estoc al servidor.\n\nObre l\'app de nou i veuràs els canvis.');
});

/* ======================================================================
   COMPRA
   ====================================================================== */
function generateShoppingList(){
  // Recull tots els ingredients dels sopars de la setmana actual
  // que NO tenim a l'inventari
  const ingredients = new Map();
  for(let i=0;i<7;i++){
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    const key = fmtDate(d);
    const dinnerKey = state.mealOverrides[key+'-dinner'] || DEFAULT_DINNERS[key];
    const weekendLunchKey = WEEKEND_LUNCHES[key];
    [dinnerKey, weekendLunchKey].filter(Boolean).forEach(rk=>{
      const r = RECIPES[rk]; if(!r) return;
      r.ingredients.forEach(ing=>{
        if(!haveIngredient(ing.n)){
          if(!ingredients.has(ing.n)) ingredients.set(ing.n, ing.q);
        }
      });
    });
  }
  return Array.from(ingredients.entries()).map(([name,qty])=>({name,qty}));
}

function renderShopping(){
  const list = document.getElementById('shop-list');
  list.innerHTML = '';
  const items = generateShoppingList();
  if(items.length===0){
    list.innerHTML = '<div class="festiu-only">Tot el necessari ja és a casa! 🎉</div>';
    return;
  }
  items.forEach(s=>{
    const done = state.shopDone[s.name];
    const el = document.createElement('div');
    el.className = 'shop-item' + (done?' done':'');
    el.innerHTML = `
      <button class="shop-check ${done?'done':''}">${done?'✓':''}</button>
      <div class="shop-name">${s.name}</div>
      <div class="shop-qty">${s.qty}</div>
    `;
    el.querySelector('.shop-check').addEventListener('click',()=>{
      state.shopDone[s.name] = !state.shopDone[s.name];
      scheduleSave();
      renderShopping();
    });
    list.appendChild(el);
  });
}

/* ======================================================================
   LOGIN
   ====================================================================== */
async function tryLogin(){
  const key = document.getElementById('login-key').value.trim();
  if(!key) return;
  AUTH_KEY = key;
  try{
    const data = await apiGet();
    localStorage.setItem('aina_auth', key);
    Object.assign(state, data);
    if(!state.feedback) state.feedback = {};
    if(!state.mealOverrides) state.mealOverrides = {};
    if(!state.inventory) state.inventory = [];
    if(!state.shopDone) state.shopDone = {};
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    renderWeek();
  }catch(e){
    if(e.message==='AUTH'){
      document.getElementById('login-err').textContent = 'Clau incorrecta.';
      AUTH_KEY = '';
    } else {
      document.getElementById('login-err').textContent = 'Error de connexió. Reintenta.';
    }
  }
}
document.getElementById('login-btn').addEventListener('click',tryLogin);
document.getElementById('login-key').addEventListener('keydown',(e)=>{ if(e.key==='Enter') tryLogin() });
